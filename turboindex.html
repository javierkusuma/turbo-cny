<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Turbo CNY 2026 - Multiplayer Racing</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background: #000; 
            overflow: hidden; 
            margin: 0; 
            touch-action: manipulation;
        }
        @keyframes roadMove { from { transform: translateY(-200px); } to { transform: translateY(0); } }
        .road-animate { animation: roadMove var(--speed) linear infinite; }
        
        .garage-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .garage-scroll::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
        }
        .garage-scroll::-webkit-scrollbar-thumb {
            background: #dc2626;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, query, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        window.FirebaseSDK = {
            initializeApp, getFirestore, doc, setDoc, getDoc, onSnapshot, collection, query, deleteDoc,
            getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icons = {
            Play: ({ size = 24 }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            ),
            ShoppingCart: ({ size = 24 }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
            ),
            Coins: ({ size = 24, className }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="8" cy="8" r="6"/><path d="M18.09 10.37A6 6 0 1 1 10.34 18"/><path d="M7 6h1v4"/><path d="m16.71 13.88.7.71-2.82 2.82"/></svg>
            ),
            ChevronRight: ({ size = 24, className }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"/></svg>
            ),
            Sparkles: ({ size = 24, className }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3 1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>
            ),
            Lock: ({ size = 24 }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            ),
            CheckCircle2: ({ size = 24 }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
            )
        };

        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'turbo-pro-drag-online';

        const VEHICLES = [
            { id: 'starter', name: 'Drift King', color: '#ef4444', price: 0, maxSpeed: 8, acceleration: 0.1 },
            { id: 'classic', name: 'Muscle 69', color: '#f59e0b', price: 500, maxSpeed: 10, acceleration: 0.12 },
            { id: 'tuner', name: 'JDM Spirit', color: '#3b82f6', price: 1500, maxSpeed: 12, acceleration: 0.15 },
            { id: 'euro', name: 'Euro Sport', color: '#10b981', price: 3500, maxSpeed: 15, acceleration: 0.18 },
            { id: 'cny_dragon', name: 'Fire Dragon 2026', color: '#dc2626', price: 8888, maxSpeed: 22, acceleration: 0.28, special: 'CNY' },
            { id: 'cyber', name: 'Cyber Runner', color: '#94a3b8', price: 15000, maxSpeed: 18, acceleration: 0.22 },
            { id: 'v12', name: 'V12 Beast', color: '#b91c1c', price: 30000, maxSpeed: 25, acceleration: 0.32 },
            { id: 'god', name: 'Speed God', color: '#fbbf24', price: 500000, maxSpeed: 55, acceleration: 1.0 },
        ];

        const NPC_COLORS = ['#334155', '#475569', '#1e293b'];

        function CarModel({ color, scale = 1 }) {
            return (
                <div style={{ transform: `scale(${scale})` }}>
                    <svg width="45" height="90" viewBox="0 0 45 90">
                        <path d="M5 15 C 5 5, 40 5, 40 15 L 42 75 C 42 85, 3 85, 3 75 Z" fill={color} stroke="#000" strokeWidth="2" />
                        <path d="M10 30 L 35 30 L 37 55 C 37 60, 8 60, 8 55 Z" fill="#0f172a" />
                        <rect x="13" y="34" width="19" height="12" rx="3" fill="#334155" opacity="0.6" />
                        <rect x="2" y="78" width="41" height="6" rx="1" fill="#000" />
                        <rect x="-2" y="15" width="8" height="18" rx="4" fill="#000" />
                        <rect x="39" y="15" width="8" height="18" rx="4" fill="#000" />
                        <rect x="-2" y="60" width="8" height="18" rx="4" fill="#000" />
                        <rect x="39" y="60" width="8" height="18" rx="4" fill="#000" />
                    </svg>
                </div>
            );
        }

        function Lampion({ className }) {
            return (
                <div className={`flex flex-col items-center ${className}`}>
                    <div className="w-1 h-4 bg-yellow-600" />
                    <div className="w-8 h-10 bg-red-600 rounded-full border-2 border-yellow-500 shadow-lg flex flex-col justify-around py-1">
                        <div className="w-full h-px bg-yellow-500/30" />
                        <div className="w-full h-px bg-yellow-500/30" />
                    </div>
                    <div className="w-4 h-3 bg-yellow-500 rounded-b-lg" />
                </div>
            );
        }

        function App() {
            const [user, setUser] = useState(null);
            const [userData, setUserData] = useState({ coins: 0, unlocked: ['starter'], selectedVehicle: 'starter', wins: 0 });
            const [gameState, setGameState] = useState('menu');
            const [players, setPlayers] = useState({});
            const [npcs, setNpcs] = useState([]);
            const [rivals, setRivals] = useState([]);
            const [message, setMessage] = useState(null);
            const [myCar, setMyCar] = useState({ x: 50, distance: 0, speed: 0, isCrashed: false, finishLine: 4000 });

            const keys = useRef({});
            const requestRef = useRef();
            const npcRef = useRef([]);
            const rivalsRef = useRef([]);

            const { initializeApp, getFirestore, doc, setDoc, getDoc, onSnapshot, collection, query, deleteDoc, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } = window.FirebaseSDK;
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (err) {}
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, async (u) => {
                    if (u) {
                        setUser(u);
                        const userDoc = doc(db, 'artifacts', appId, 'users', u.uid, 'profile', 'data');
                        const snap = await getDoc(userDoc);
                        if (snap.exists()) {
                            setUserData(snap.data());
                        } else {
                            const initial = { coins: 888, unlocked: ['starter'], selectedVehicle: 'starter', wins: 0 };
                            await setDoc(userDoc, initial);
                            setUserData(initial);
                        }
                    }
                });
                return () => unsubscribe();
            }, []);

            const saveProfile = async (data) => {
                if (!user) return;
                const userDoc = doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'data');
                await setDoc(userDoc, data);
                setUserData(data);
            };

            useEffect(() => {
                if (!user || gameState !== 'playing') return;
                const sync = setInterval(async () => {
                    try {
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', user.uid), {
                            uid: user.uid,
                            x: myCar.x,
                            vehicleId: userData.selectedVehicle,
                            distance: Math.floor(myCar.distance),
                            speed: (myCar.speed * 20).toFixed(0),
                            lastSeen: Date.now()
                        });
                    } catch (e) {}
                }, 200);

                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'players'));
                const unsub = onSnapshot(q, (snap) => {
                    let p = {};
                    snap.forEach(d => { if (d.id !== user.uid) p[d.id] = d.data(); });
                    setPlayers(p);
                }, (err) => console.error(err));

                return () => {
                    clearInterval(sync);
                    unsub();
                    deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', user.uid));
                };
            }, [user, gameState, myCar.x, myCar.distance]);

            const curVeh = VEHICLES.find(v => v.id === userData.selectedVehicle) || VEHICLES[0];

            const spawnNpc = () => ({ id: Math.random(), x: 20 + Math.random()*60, y: -50, speed: 1 + Math.random()*2, color: NPC_COLORS[Math.floor(Math.random()*3)] });
            const spawnRival = () => ({ id: 'r'+Math.random(), x: 40 + Math.random()*20, distance: 0, speed: curVeh.maxSpeed * 0.9 + Math.random(), color: '#FFD700' });

            const gameLoop = () => {
                if (gameState !== 'playing') return;
                setMyCar(prev => {
                    let nx = prev.x; let ns = prev.speed; let nd = prev.distance; let cr = false;
                    
                    if (nd >= prev.finishLine) {
                        setGameState('menu');
                        const won = !rivalsRef.current.some(r => r.distance > nd);
                        const earned = (1000 + Math.floor(nd/2) + (won ? 2000 : 0)) * 2;
                        saveProfile({ ...userData, coins: userData.coins + earned, wins: won ? userData.wins+1 : userData.wins });
                        setMessage(won ? `HUAT AH! +${earned} Koin!` : `FINISH! +${earned} Koin`);
                        return { ...prev, speed: 0 };
                    }

                    if (keys.current['a'] || keys.current['arrowleft']) nx -= 2;
                    if (keys.current['d'] || keys.current['arrowright']) nx += 2;
                    if (keys.current['w'] || keys.current['arrowup'] || keys.current[' ']) ns = Math.min(ns + curVeh.acceleration, curVeh.maxSpeed);
                    else ns = Math.max(ns - 0.2, 0);

                    nx = Math.max(15, Math.min(85, nx));
                    nd += ns;

                    const nextNpcs = npcRef.current.map(n => ({ ...n, y: n.y + (n.speed + ns*0.5) })).filter(n => n.y < 150);
                    if (nextNpcs.length < 5 && Math.random() < 0.05) nextNpcs.push(spawnNpc());
                    nextNpcs.forEach(n => { if (Math.abs(n.x - nx) < 8 && Math.abs(n.y - 80) < 12) cr = true; });

                    const nextRivals = (rivalsRef.current.length ? rivalsRef.current : [spawnRival()]).map(r => ({ ...r, distance: r.distance + r.speed }));

                    npcRef.current = nextNpcs; rivalsRef.current = nextRivals;
                    setNpcs(nextNpcs); setRivals(nextRivals);
                    return { ...prev, x: nx, speed: cr ? 0.5 : ns, distance: nd, isCrashed: cr };
                });
                requestRef.current = requestAnimationFrame(gameLoop);
            };

            useEffect(() => {
                if (gameState === 'playing') {
                    const kd = e => keys.current[e.key.toLowerCase()] = true;
                    const ku = e => keys.current[e.key.toLowerCase()] = false;
                    window.addEventListener('keydown', kd); window.addEventListener('keyup', ku);
                    requestRef.current = requestAnimationFrame(gameLoop);
                    return () => { window.removeEventListener('keydown', kd); window.removeEventListener('keyup', ku); cancelAnimationFrame(requestRef.current); };
                }
            }, [gameState]);

            if (gameState === 'shop') return (
                <div className="h-screen w-full bg-slate-950 text-white flex flex-col overflow-hidden">
                    <div className="flex justify-between items-center p-6 border-b-2 border-red-600 bg-slate-900 z-10">
                        <div>
                            <h2 className="text-3xl font-black italic text-red-500 tracking-tighter">GARASI IMLEK</h2>
                            <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Koleksi Mobil 2026</p>
                        </div>
                        <div className="bg-red-600 px-6 py-3 rounded-full flex items-center gap-3 border-2 border-yellow-400 shadow-lg shadow-red-900/20">
                            <Icons.Coins size={22} className="text-yellow-300" /> 
                            <span className="text-xl font-black">{userData.coins.toLocaleString()}</span>
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto p-6 garage-scroll">
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 pb-32">
                            {VEHICLES.map(v => {
                                const isUnlocked = userData.unlocked.includes(v.id);
                                const isSelected = userData.selectedVehicle === v.id;
                                return (
                                    <div key={v.id} className={`p-6 rounded-[2.5rem] border-2 transition-all group relative overflow-hidden ${isSelected ? 'border-red-500 bg-red-500/10' : 'border-slate-800 bg-slate-900/50 hover:border-red-900'}`}>
                                        {v.special === 'CNY' && (
                                            <div className="absolute top-0 right-0 bg-yellow-500 text-black text-[10px] font-black px-4 py-1 rotate-45 translate-x-4 translate-y-2 uppercase">LUNAR</div>
                                        )}
                                        <div className="flex flex-col items-center gap-6">
                                            <div className="w-full aspect-square bg-black/40 rounded-3xl flex items-center justify-center border border-white/5">
                                                <CarModel color={v.color} scale={1.1} />
                                            </div>
                                            <div className="text-center w-full">
                                                <h3 className={`text-xl font-black uppercase italic tracking-tighter ${v.special === 'CNY' ? 'text-yellow-500' : 'text-white'}`}>{v.name}</h3>
                                                <div className="mt-4 grid grid-cols-2 gap-2">
                                                    <div className="bg-black/50 p-2 rounded-xl border border-white/5">
                                                        <p className="text-[8px] text-slate-500 font-bold uppercase">Speed</p>
                                                        <p className="text-sm font-black italic text-white">{(v.maxSpeed * 20)}</p>
                                                    </div>
                                                    <div className="bg-black/50 p-2 rounded-xl border border-white/5">
                                                        <p className="text-[8px] text-slate-500 font-bold uppercase">Accel</p>
                                                        <p className="text-sm font-black italic text-white">{v.acceleration}</p>
                                                    </div>
                                                </div>
                                            </div>
                                            {isUnlocked ? (
                                                <button 
                                                    disabled={isSelected}
                                                    onClick={() => saveProfile({...userData, selectedVehicle: v.id})} 
                                                    className={`w-full py-4 rounded-2xl font-black italic transition-all flex items-center justify-center gap-2 ${isSelected ? 'bg-red-600 text-white' : 'bg-slate-800 text-white hover:bg-slate-700'}`}
                                                >
                                                    {isSelected ? <><Icons.CheckCircle2 size={18} /> DIPAKAI</> : 'PILIH MOBIL'}
                                                </button>
                                            ) : (
                                                <button 
                                                    onClick={() => {
                                                        if (userData.coins >= v.price) {
                                                            saveProfile({...userData, coins: userData.coins - v.price, unlocked: [...userData.unlocked, v.id], selectedVehicle: v.id});
                                                            setMessage(`Membeli ${v.name}!`);
                                                        } else {
                                                            setMessage("Koin Kurang!");
                                                        }
                                                    }} 
                                                    className="w-full bg-yellow-500 text-black py-4 rounded-2xl font-black italic flex items-center justify-center gap-2 shadow-xl hover:bg-yellow-400"
                                                >
                                                    <Icons.Lock size={18} /> {v.price.toLocaleString()}
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    <div className="p-6 bg-slate-900/80 backdrop-blur-md border-t border-white/5 fixed bottom-0 left-0 w-full z-20 flex justify-center">
                        <button onClick={() => setGameState('menu')} className="w-full max-w-sm bg-white text-black py-4 rounded-full font-black italic hover:scale-105 transition-transform shadow-2xl">
                            KEMBALI KE LOBBY
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="w-full h-screen bg-black relative text-white overflow-hidden">
                    {message && <div className="fixed top-10 left-1/2 -translate-x-1/2 z-[100] bg-red-600 border-2 border-yellow-400 px-8 py-4 rounded-full font-black animate-bounce shadow-2xl">{message}</div>}
                    
                    {gameState === 'menu' ? (
                        <div className="h-full flex flex-col items-center justify-center space-y-8 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-red-900/20 via-black to-black p-6">
                            <div className="absolute top-10 left-10 hidden md:block"><Lampion className="animate-bounce" /></div>
                            <div className="absolute top-10 right-10 hidden md:block"><Lampion className="animate-bounce" /></div>
                            
                            <div className="text-center">
                                <span className="bg-yellow-500 text-black px-3 py-1 rounded-full text-[10px] font-black tracking-widest uppercase flex items-center gap-1 justify-center mx-auto w-max mb-2 animate-pulse">
                                    <Icons.Sparkles size={10} /> Lunar Race 2026
                                </span>
                                <h1 className="text-6xl md:text-8xl font-black italic tracking-tighter">TURBO <span className="text-red-500">CNY</span></h1>
                            </div>

                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 w-full max-w-md">
                                <button onClick={() => setGameState('playing')} className="bg-red-600 p-6 rounded-[2rem] font-black text-2xl hover:scale-105 transition-transform shadow-lg shadow-red-900/40 flex items-center justify-center gap-3">
                                    <Icons.Play size={28} /> BALAP
                                </button>
                                <button onClick={() => setGameState('shop')} className="bg-slate-900 border-4 border-slate-800 p-6 rounded-[2rem] font-black text-2xl hover:scale-105 transition-transform flex items-center justify-center gap-3">
                                    <Icons.ShoppingCart size={28} /> GARASI
                                </button>
                            </div>

                            <div className="flex items-center gap-8 bg-white/5 p-8 rounded-[2.5rem] border border-white/10 backdrop-blur-sm w-full max-w-md relative overflow-hidden group">
                                <div className="absolute top-4 left-4 flex items-center gap-2">
                                    <div className="w-2 h-2 rounded-full bg-red-500 animate-ping" />
                                    <span className="text-[10px] font-bold text-slate-500 uppercase">Live: {Object.keys(players).length + 1} Pemain</span>
                                </div>
                                <div className="flex-1 flex flex-col items-center sm:items-start">
                                    <p className="text-[10px] text-red-500 uppercase font-black tracking-widest mb-1">Mobil Aktif</p>
                                    <p className="text-2xl font-black italic uppercase tracking-tighter text-white">{curVeh.name}</p>
                                    <div className="flex items-center gap-2 text-yellow-500 font-black text-lg mt-2">
                                        <Icons.Coins size={18} /> {userData.coins.toLocaleString()}
                                    </div>
                                </div>
                                <div className="hidden sm:block">
                                    <CarModel color={curVeh.color} scale={1.2} />
                                </div>
                            </div>
                            
                            {/* Watermark Section */}
                            <div className="absolute bottom-6 text-center">
                                <p className="text-[10px] font-bold text-white/30 tracking-[0.3em] uppercase italic">
                                    Made by Javier
                                </p>
                            </div>
                        </div>
                    ) : (
                        <div className="h-full flex justify-center bg-slate-950">
                            <div className="w-full md:w-[500px] h-full bg-slate-900 relative border-x-[12px] border-slate-800">
                                <div className="absolute inset-0 road-animate" style={{ 
                                    '--speed': `${0.6 / (0.3 + myCar.speed * 0.1)}s`,
                                    backgroundImage: 'linear-gradient(#fff 50px, transparent 50px)', 
                                    backgroundSize: '4px 200px', 
                                    backgroundPosition: 'center' 
                                }} />
                                
                                {npcs.map(n => <div key={n.id} className="absolute" style={{ left: `${n.x}%`, top: `${n.y}%`, transform: 'translateX(-50%)' }}><CarModel color={n.color} /></div>)}
                                {rivals.map(r => {
                                    const rel = 80 - (r.distance - myCar.distance) * 0.15;
                                    if (rel < -20 || rel > 120) return null;
                                    return <div key={r.id} className="absolute z-10" style={{ left: `${r.x}%`, top: `${rel}%`, transform: 'translateX(-50%)' }}>
                                        <div className="text-[10px] bg-yellow-500 text-black px-2 rounded-full font-bold mb-1 shadow-md uppercase">Boss</div>
                                        <CarModel color={r.color} />
                                    </div>
                                })}
                                {Object.values(players).map(p => {
                                    const rel = 80 - (p.distance - myCar.distance) * 0.15;
                                    if (rel < -20 || rel > 120) return null;
                                    return <div key={p.uid} className="absolute opacity-60" style={{ left: `${p.x}%`, top: `${rel}%`, transform: 'translateX(-50%)' }}>
                                        <div className="text-[8px] bg-red-600 text-white px-1 rounded uppercase mb-1 font-bold">{p.speed} KM/H</div>
                                        <CarModel color={VEHICLES.find(v=>v.id===p.vehicleId)?.color || '#fff'} />
                                    </div>
                                })}

                                <div className={`absolute z-20 top-[80%] transition-transform ${myCar.isCrashed ? 'opacity-50 blur-[1px]' : ''}`} style={{ left: `${myCar.x}%`, transform: 'translate(-50%, -50%)' }}>
                                    <CarModel color={curVeh.color} scale={1.1} />
                                </div>
                            </div>

                            <div className="absolute top-6 inset-x-6 flex justify-between pointer-events-none">
                                <div className="bg-black/80 backdrop-blur-md p-4 rounded-2xl border border-red-500/40 shadow-2xl">
                                    <p className="text-[10px] font-black text-red-500 uppercase tracking-widest">Finish In</p>
                                    <p className="text-2xl font-black italic text-white">{Math.max(0, 4000 - Math.floor(myCar.distance))}m</p>
                                </div>
                                <div className="bg-black/80 backdrop-blur-md p-4 rounded-2xl border border-yellow-500/40 shadow-2xl text-right">
                                    <p className="text-[10px] font-black text-yellow-500 uppercase tracking-widest">Speed</p>
                                    <p className="text-2xl font-black italic text-white">{(myCar.speed * 20).toFixed(0)} <span className="text-xs uppercase">Km/h</span></p>
                                </div>
                            </div>

                            <div className="absolute bottom-10 inset-x-6 flex justify-between items-center md:hidden pointer-events-none">
                                <div className="flex gap-4 pointer-events-auto">
                                    <button onPointerDown={()=>keys.current['a']=true} onPointerUp={()=>keys.current['a']=false} className="w-16 h-16 bg-white/10 backdrop-blur-lg rounded-2xl flex items-center justify-center border border-white/20 active:bg-red-600 shadow-xl transition-colors"><Icons.ChevronRight className="rotate-180" size={32} /></button>
                                    <button onPointerDown={()=>keys.current['d']=true} onPointerUp={()=>keys.current['d']=false} className="w-16 h-16 bg-white/10 backdrop-blur-lg rounded-2xl flex items-center justify-center border border-white/20 active:bg-red-600 shadow-xl transition-colors"><Icons.ChevronRight size={32} /></button>
                                </div>
                                <button onPointerDown={()=>keys.current['w']=true} onPointerUp={()=>keys.current['w']=false} className="w-24 h-24 bg-red-600/90 backdrop-blur-xl rounded-full border-4 border-yellow-400 font-black italic shadow-[0_0_40px_rgba(220,38,38,0.5)] active:scale-90 transition-all pointer-events-auto">GAS</button>
                            </div>
                            <button onClick={()=>setGameState('menu')} className="absolute top-2 left-1/2 -translate-x-1/2 bg-white/10 px-6 py-1 rounded-full text-[10px] font-bold text-white/40 hover:text-white transition-all uppercase tracking-tighter">Lobby</button>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
